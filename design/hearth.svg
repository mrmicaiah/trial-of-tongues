<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844" font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.45  0 0 0 0 0.35  0 0 0 0 0.2  0 0 0 0.06 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#F4ECD8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#E8DFC7" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="flameGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A65B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9A65B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="390" height="844" fill="#F4ECD8"/>
  <rect width="390" height="844" fill="#F4ECD8" filter="url(#grain)"/>
  <rect width="390" height="844" fill="url(#vignette)"/>

  <!-- Status bar -->
  <text x="30" y="30" font-size="15" font-weight="600" fill="#1A1308" font-family="'SF Pro', system-ui, sans-serif">9:41</text>
  <g opacity="0.9" fill="#1A1308">
    <rect x="328" y="22" width="4" height="11" rx="1"/>
    <rect x="334" y="20" width="4" height="13" rx="1"/>
    <rect x="340" y="18" width="4" height="15" rx="1"/>
    <rect x="346" y="16" width="4" height="17" rx="1"/>
    <rect x="356" y="20" width="22" height="11" rx="2" fill="none" stroke="#1A1308" stroke-width="1"/>
    <rect x="358" y="22" width="16" height="7" rx="1"/>
  </g>

  <!-- Header band: same shape, smaller candle (matches Chamber) -->
  <g transform="translate(0, 47)">
    <g transform="translate(20, 24)">
      <rect x="2" y="6" width="6" height="14" fill="#C9A65B" opacity="0.85"/>
      <ellipse cx="5" cy="4" rx="2" ry="3.5" fill="#C9A65B"/>
      <ellipse cx="5" cy="3" rx="1" ry="2" fill="#F4ECD8" opacity="0.6"/>
    </g>
    <text x="370" y="34" font-size="13" font-weight="600" letter-spacing="1.2" text-anchor="end" fill="#3A2E1F">DOSSIER</text>
    <line x1="20" y1="56" x2="370" y2="56" stroke="#8C6F2E" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Large central candle motif (~80x80) -->
  <g transform="translate(195, 380)">
    <!-- Glow halo -->
    <circle cx="0" cy="-12" r="60" fill="url(#flameGlow)"/>
    <!-- Candle body -->
    <rect x="-8" y="0" width="16" height="48" fill="#C9A65B" opacity="0.9"/>
    <!-- Wick -->
    <line x1="0" y1="0" x2="0" y2="-6" stroke="#1A1308" stroke-width="1" opacity="0.7"/>
    <!-- Flame -->
    <ellipse cx="0" cy="-14" rx="5" ry="10" fill="#C9A65B"/>
    <ellipse cx="0" cy="-15" rx="2.5" ry="5" fill="#F4ECD8" opacity="0.6"/>
    <!-- Base shadow -->
    <ellipse cx="0" cy="50" rx="14" ry="3" fill="#1A1308" opacity="0.1"/>
  </g>

  <!-- Wizard's line -->
  <g transform="translate(195, 510)">
    <text text-anchor="middle" font-size="19" font-style="italic" font-weight="500" fill="#1A1308">
      <tspan x="0" dy="0">&#x201C;The chamber waits. There is</tspan>
      <tspan x="0" dy="26">something for you today.&#x201D;</tspan>
    </text>
  </g>

  <!-- Tap target: enter the chamber -->
  <g transform="translate(195, 620)">
    <text text-anchor="middle" font-size="14" font-weight="600" letter-spacing="1.4" fill="#8C6F2E">ENTER THE CHAMBER</text>
    <!-- Underline -->
    <line x1="-80" y1="10" x2="80" y2="10" stroke="#8C6F2E" stroke-width="0.5" opacity="0.6"/>
  </g>

  <!-- Home indicator -->
  <rect x="125" y="828" width="140" height="5" rx="2.5" fill="#1A1308" opacity="0.5"/>
</svg>
