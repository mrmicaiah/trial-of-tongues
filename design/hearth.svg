<svg width="390" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'EB Garamond', Garamond, serif">
  <title>Hearth — the quiet view between puzzles</title>
  <desc>The Hearth view, shown when no puzzle is active. The chamber is empty.</desc>

  <rect x="0" y="0" width="390" height="844" fill="#0a0a0a"/>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="#1a1a1a"/>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="#E8DCC1"/>

  <g opacity="0.07" fill="#1A1308">
    <circle cx="60" cy="120" r="0.7"/><circle cx="180" cy="100" r="0.5"/>
    <circle cx="280" cy="140" r="0.6"/><circle cx="100" cy="240" r="0.6"/>
    <circle cx="220" cy="220" r="0.7"/><circle cx="320" cy="260" r="0.5"/>
    <circle cx="80" cy="380" r="0.6"/><circle cx="240" cy="400" r="0.5"/>
    <circle cx="340" cy="380" r="0.7"/><circle cx="120" cy="520" r="0.5"/>
    <circle cx="260" cy="540" r="0.6"/><circle cx="80" cy="660" r="0.7"/>
    <circle cx="220" cy="680" r="0.5"/><circle cx="320" cy="660" r="0.6"/>
  </g>

  <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
    <stop offset="40%" stop-color="#E8DCC1" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1A1308" stop-opacity="0.25"/>
  </radialGradient>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="url(#vignette)"/>

  <rect x="6" y="6" width="378" height="44" fill="#E8DCC1"/>
  <text x="36" y="33" font-size="15" font-weight="600" fill="#1A1308" font-family="-apple-system, system-ui, sans-serif">9:41</text>
  <g fill="#1A1308" opacity="0.8">
    <rect x="320" y="22" width="3" height="8" rx="0.5"/>
    <rect x="325" y="20" width="3" height="10" rx="0.5"/>
    <rect x="330" y="18" width="3" height="12" rx="0.5"/>
    <rect x="335" y="16" width="3" height="14" rx="0.5"/>
    <rect x="345" y="18" width="16" height="10" rx="2" fill="none" stroke="#1A1308" stroke-width="0.8"/>
    <rect x="347" y="20" width="11" height="6" rx="0.5"/>
  </g>

  <!-- Single dim candle -->
  <g transform="translate(195, 220)">
    <rect x="-4" y="20" width="8" height="40" fill="#1A1308" opacity="0.6"/>
    <rect x="-7" y="56" width="14" height="6" rx="1" fill="#1A1308" opacity="0.5"/>
    <line x1="0" y1="20" x2="0" y2="12" stroke="#1A1308" stroke-width="0.8"/>
    <ellipse cx="0" cy="6" rx="2.5" ry="5" fill="#C9A65B" opacity="0.7"/>
    <ellipse cx="0" cy="5" rx="1.2" ry="2.5" fill="#F4ECD8" opacity="0.5"/>
    <circle cx="0" cy="8" r="22" fill="#C9A65B" opacity="0.07"/>
    <circle cx="0" cy="8" r="35" fill="#C9A65B" opacity="0.04"/>
  </g>

  <text x="195" y="380" text-anchor="middle" font-size="14" fill="#1A1308" font-style="italic" opacity="0.7">
    the chamber is empty.
  </text>
  <text x="195" y="408" text-anchor="middle" font-size="14" fill="#1A1308" font-style="italic" opacity="0.7">
    the wizard has stepped out.
  </text>

  <line x1="100" y1="490" x2="290" y2="490" stroke="#1A1308" stroke-width="0.3" opacity="0.2"/>

  <text x="195" y="528" text-anchor="middle" font-size="10" letter-spacing="3" fill="#1A1308" opacity="0.5">
    HE RETURNS AT DAWN.
  </text>

  <text x="195" y="556" text-anchor="middle" font-size="16" fill="#1A1308" font-style="italic">
    in 7 hours, 23 minutes.
  </text>

  <text x="195" y="610" text-anchor="middle" font-size="10" letter-spacing="3" fill="#C9A65B" opacity="0.85">
    FOUR TRIALS REMAIN.
  </text>

  <line x1="100" y1="668" x2="290" y2="668" stroke="#1A1308" stroke-width="0.3" opacity="0.2"/>

  <text x="195" y="702" text-anchor="middle" font-size="11" letter-spacing="2.5" fill="#1A1308" opacity="0.5">
    HE LEFT A NOTE.
  </text>

  <text x="36" y="734" font-size="14" fill="#1A1308" font-style="italic" opacity="0.85">
    <tspan x="36" dy="0">— I am told you solved the riddle. I assume</tspan>
    <tspan x="36" dy="20">someone helped you. There is no other</tspan>
    <tspan x="36" dy="20">explanation. Until tomorrow.</tspan>
  </text>

  <rect x="135" y="830" width="120" height="5" rx="2.5" fill="#1A1308"/>
</svg>
