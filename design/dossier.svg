<svg width="390" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'EB Garamond', Garamond, serif">
  <title>Dossier — the wizard's living document, on mobile</title>
  <desc>The dossier view, full-surface takeover from the Chamber.</desc>

  <rect x="0" y="0" width="390" height="844" fill="#0a0a0a"/>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="#1a1a1a"/>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="#EFE5CC"/>

  <g opacity="0.07" fill="#1A1308">
    <circle cx="40" cy="80" r="0.7"/><circle cx="120" cy="100" r="0.6"/>
    <circle cx="220" cy="60" r="0.8"/><circle cx="320" cy="90" r="0.5"/>
    <circle cx="60" cy="180" r="0.6"/><circle cx="160" cy="160" r="0.7"/>
    <circle cx="280" cy="200" r="0.5"/><circle cx="40" cy="260" r="0.7"/>
    <circle cx="140" cy="280" r="0.5"/><circle cx="240" cy="260" r="0.8"/>
    <circle cx="340" cy="300" r="0.6"/><circle cx="80" cy="380" r="0.5"/>
    <circle cx="180" cy="360" r="0.7"/><circle cx="300" cy="400" r="0.6"/>
    <circle cx="60" cy="480" r="0.7"/><circle cx="180" cy="500" r="0.5"/>
    <circle cx="280" cy="480" r="0.6"/><circle cx="100" cy="580" r="0.7"/>
    <circle cx="220" cy="600" r="0.5"/><circle cx="320" cy="620" r="0.8"/>
    <circle cx="80" cy="700" r="0.5"/><circle cx="200" cy="720" r="0.7"/>
    <circle cx="320" cy="700" r="0.6"/>
  </g>

  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="55%" stop-color="#EFE5CC" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1A1308" stop-opacity="0.15"/>
  </radialGradient>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="url(#vignette)"/>

  <rect x="6" y="6" width="378" height="44" fill="#EFE5CC"/>
  <text x="36" y="33" font-size="15" font-weight="600" fill="#1A1308" font-family="-apple-system, system-ui, sans-serif">9:41</text>
  <g fill="#1A1308" opacity="0.8">
    <rect x="320" y="22" width="3" height="8" rx="0.5"/>
    <rect x="325" y="20" width="3" height="10" rx="0.5"/>
    <rect x="330" y="18" width="3" height="12" rx="0.5"/>
    <rect x="335" y="16" width="3" height="14" rx="0.5"/>
    <rect x="345" y="18" width="16" height="10" rx="2" fill="none" stroke="#1A1308" stroke-width="0.8"/>
    <rect x="347" y="20" width="11" height="6" rx="0.5"/>
  </g>

  <text x="30" y="74" font-size="20" fill="#1A1308" opacity="0.6">‹</text>
  <text x="50" y="74" font-size="11" letter-spacing="2.5" fill="#1A1308" opacity="0.55" font-style="italic">close the book</text>

  <line x1="30" y1="92" x2="360" y2="92" stroke="#1A1308" stroke-width="0.4" opacity="0.22"/>

  <!-- Verdict seal -->
  <g transform="translate(36, 124)">
    <circle cx="0" cy="0" r="11" fill="#C9A65B" opacity="0.85"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="#8B6F2D" stroke-width="0.6"/>
    <path d="M 0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z" fill="#1A1308" opacity="0.5"/>
  </g>

  <text x="56" y="129" font-size="11" letter-spacing="2.5" fill="#1A1308" opacity="0.55">THE VERDICT</text>

  <text x="36" y="166" font-size="14" fill="#1A1308" font-style="italic">
    <tspan x="36" dy="0">The apprentice is sharper than warranted.</tspan>
    <tspan x="36" dy="20">He thinks in straight lines when straight</tspan>
    <tspan x="36" dy="20">lines are wanted, and sideways when</tspan>
    <tspan x="36" dy="20">sideways is wanted, which is the most</tspan>
    <tspan x="36" dy="20">irritating possible combination. He</tspan>
    <tspan x="36" dy="20">refuses to guess. I would call that</tspan>
    <tspan x="36" dy="20">cowardice if it were not so consistent.</tspan>
  </text>

  <line x1="36" y1="324" x2="354" y2="324" stroke="#1A1308" stroke-width="0.3" opacity="0.18"/>

  <text x="36" y="352" font-size="11" letter-spacing="2.5" fill="#1A1308" opacity="0.55">STANDING OBSERVATIONS</text>

  <text x="36" y="382" font-size="12" letter-spacing="1.5" fill="#1A1308" opacity="0.75">REASON</text>
  <text x="120" y="382" font-size="13" fill="#8B6F2D" font-style="italic">passable</text>
  <text x="36" y="402" font-size="14" fill="#1A1308" font-style="italic" opacity="0.8">
    did not collapse under contradictory premises.
  </text>

  <text x="36" y="436" font-size="12" letter-spacing="1.5" fill="#1A1308" opacity="0.75">TONGUES</text>
  <text x="120" y="436" font-size="13" fill="#8B6F2D" font-style="italic">irritating</text>
  <text x="36" y="456" font-size="14" fill="#1A1308" font-style="italic" opacity="0.8">
    caught the trap on the empty-word puzzle.
  </text>

  <text x="36" y="490" font-size="12" letter-spacing="1.5" fill="#1A1308" opacity="0.75">SHADOWS</text>
  <text x="120" y="490" font-size="13" fill="#8B6F2D" font-style="italic">concerning</text>
  <text x="36" y="510" font-size="14" fill="#1A1308" font-style="italic" opacity="0.8">
    three lateral riddles, all solved.
  </text>

  <text x="36" y="544" font-size="12" letter-spacing="1.5" fill="#1A1308" opacity="0.4">SHAPES</text>
  <text x="120" y="544" font-size="13" fill="#1A1308" opacity="0.35" font-style="italic">not yet measured.</text>

  <line x1="36" y1="586" x2="354" y2="586" stroke="#1A1308" stroke-width="0.3" opacity="0.18"/>

  <text x="36" y="614" font-size="11" letter-spacing="2.5" fill="#1A1308" opacity="0.55">NOTES</text>

  <circle cx="42" cy="640" r="1.5" fill="#1A1308" opacity="0.75"/>
  <text x="52" y="644" font-size="14" fill="#1A1308" font-style="italic" opacity="0.85">
    this one probes carefully.
  </text>

  <circle cx="42" cy="666" r="1.5" fill="#1A1308" opacity="0.75"/>
  <text x="52" y="670" font-size="14" fill="#1A1308" font-style="italic" opacity="0.85">
    <tspan x="52" dy="0">refuses to guess. cowardly</tspan>
    <tspan x="52" dy="18">or careful — i'll see.</tspan>
  </text>

  <circle cx="42" cy="710" r="1.5" fill="#1A1308" opacity="0.75"/>
  <text x="52" y="714" font-size="14" fill="#1A1308" font-style="italic" opacity="0.85">
    bargains when cornered. files this away.
  </text>

  <line x1="36" y1="748" x2="354" y2="748" stroke="#1A1308" stroke-width="0.3" opacity="0.18"/>

  <text x="36" y="776" font-size="11" letter-spacing="2.5" fill="#1A1308" opacity="0.55">GRUDGES</text>

  <text x="36" y="806" font-size="20" font-weight="500" fill="#1A1308">G</text>
  <text x="56" y="806" font-size="14" fill="#1A1308">solved the elevator riddle in 22 seconds.</text>
  <text x="56" y="824" font-size="10" letter-spacing="1.5" fill="#C9A65B" font-style="italic">— day 4</text>

  <rect x="135" y="830" width="120" height="5" rx="2.5" fill="#1A1308"/>
</svg>
