<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 1280" width="390" height="1280" font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.45  0 0 0 0 0.35  0 0 0 0 0.2  0 0 0 0.06 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#F4ECD8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#E8DFC7" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="sealGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4B570"/>
      <stop offset="60%" stop-color="#C9A65B"/>
      <stop offset="100%" stop-color="#8C6F2E"/>
    </radialGradient>
  </defs>

  <rect width="390" height="1280" fill="#F4ECD8"/>
  <rect width="390" height="1280" fill="#F4ECD8" filter="url(#grain)"/>
  <rect width="390" height="1280" fill="url(#vignette)"/>

  <!-- Status bar -->
  <text x="30" y="30" font-size="15" font-weight="600" fill="#1A1308" font-family="'SF Pro', system-ui, sans-serif">9:41</text>
  <g opacity="0.9" fill="#1A1308">
    <rect x="328" y="22" width="4" height="11" rx="1"/>
    <rect x="334" y="20" width="4" height="13" rx="1"/>
    <rect x="340" y="18" width="4" height="15" rx="1"/>
    <rect x="346" y="16" width="4" height="17" rx="1"/>
    <rect x="356" y="20" width="22" height="11" rx="2" fill="none" stroke="#1A1308" stroke-width="1"/>
    <rect x="358" y="22" width="16" height="7" rx="1"/>
  </g>

  <!-- Header band: chevron (left), CLOSE (right) -->
  <g transform="translate(0, 47)">
    <text x="20" y="38" font-size="28" font-weight="500" fill="#1A1308">&#x2039;</text>
    <text x="370" y="34" font-size="13" font-weight="600" letter-spacing="1.2" text-anchor="end" fill="#3A2E1F">CLOSE</text>
    <line x1="20" y1="56" x2="370" y2="56" stroke="#8C6F2E" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- ============ VERDICT ============ -->
  <g transform="translate(195, 160)">
    <!-- Wax seal -->
    <circle cx="0" cy="0" r="32" fill="url(#sealGradient)"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#8C6F2E" stroke-width="0.5"/>
    <!-- Faux sigil inside seal: a stylized T (for Tongues) -->
    <g fill="#1A1308" opacity="0.55">
      <rect x="-10" y="-10" width="20" height="3"/>
      <rect x="-1.5" y="-10" width="3" height="20"/>
    </g>
    <!-- Verdict text below seal -->
    <text x="0" y="62" text-anchor="middle" font-size="22" font-weight="500" font-style="italic" fill="#1A1308">A reluctant student of the obvious.</text>
  </g>

  <!-- ============ STANDING OBSERVATIONS ============ -->
  <g transform="translate(0, 270)">
    <text x="28" y="0" font-size="13" font-weight="600" letter-spacing="1.4" fill="#3A2E1F">STANDING OBSERVATIONS</text>
    <line x1="28" y1="10" x2="362" y2="10" stroke="#8C6F2E" stroke-width="0.5" opacity="0.35"/>

    <!-- Domain rows -->
    <g font-size="17" font-style="italic" font-weight="500">
      <text x="28" y="40" fill="#1A1308">Reason</text>
      <text x="362" y="40" text-anchor="end" fill="#3A2E1F">passable</text>

      <text x="28" y="72" fill="#1A1308">Sight</text>
      <text x="362" y="72" text-anchor="end" fill="#3A2E1F">irritating</text>

      <text x="28" y="104" fill="#1A1308">Tongues</text>
      <text x="362" y="104" text-anchor="end" fill="#3A2E1F">unremarkable</text>

      <text x="28" y="136" fill="#1A1308">Shadows</text>
      <text x="362" y="136" text-anchor="end" fill="#3A2E1F">concerning</text>

      <text x="28" y="168" fill="#1A1308">Shapes</text>
      <text x="362" y="168" text-anchor="end" fill="#3A2E1F">passable</text>

      <text x="28" y="200" fill="#1A1308">Memory</text>
      <text x="362" y="200" text-anchor="end" fill="#7A6A52">not yet observed</text>

      <text x="28" y="232" fill="#1A1308">Cunning</text>
      <text x="362" y="232" text-anchor="end" fill="#7A6A52">not yet observed</text>
    </g>
  </g>

  <!-- ============ BEHAVIORAL NOTES ============ -->
  <g transform="translate(0, 540)">
    <text x="28" y="0" font-size="13" font-weight="600" letter-spacing="1.4" fill="#3A2E1F">BEHAVIORAL NOTES</text>
    <line x1="28" y1="10" x2="362" y2="10" stroke="#8C6F2E" stroke-width="0.5" opacity="0.35"/>

    <!-- Note 1 -->
    <g transform="translate(0, 36)">
      <text x="28" y="0" font-size="15" font-weight="400" fill="#1A1308">
        <tspan x="28" dy="0">Reads the puzzle twice before answering.</tspan>
        <tspan x="28" dy="20">Pretends to be impatient. Is not.</tspan>
      </text>
      <text x="362" y="0" text-anchor="end" font-size="12" letter-spacing="1.2" font-weight="500" fill="#7A6A52">DAY 1</text>
    </g>

    <!-- Note 2 -->
    <g transform="translate(0, 100)">
      <text x="28" y="0" font-size="15" font-weight="400" fill="#1A1308">
        <tspan x="28" dy="0">Bargained with the second jar puzzle.</tspan>
        <tspan x="28" dy="20">Tried to redefine "label" mid-stream.</tspan>
      </text>
      <text x="362" y="0" text-anchor="end" font-size="12" letter-spacing="1.2" font-weight="500" fill="#7A6A52">DAY 1</text>
    </g>

    <!-- Note 3 -->
    <g transform="translate(0, 164)">
      <text x="28" y="0" font-size="15" font-weight="400" fill="#1A1308">
        <tspan x="28" dy="0">Said "huh" out loud when the elevator</tspan>
        <tspan x="28" dy="20">riddle revealed itself. I heard it.</tspan>
      </text>
      <text x="362" y="0" text-anchor="end" font-size="12" letter-spacing="1.2" font-weight="500" fill="#7A6A52">DAY 2</text>
    </g>

    <!-- Note 4 -->
    <g transform="translate(0, 228)">
      <text x="28" y="0" font-size="15" font-weight="400" fill="#1A1308">
        <tspan x="28" dy="0">Asked about the painted cube three</tspan>
        <tspan x="28" dy="20">different ways. Worth noting.</tspan>
      </text>
      <text x="362" y="0" text-anchor="end" font-size="12" letter-spacing="1.2" font-weight="500" fill="#7A6A52">DAY 3</text>
    </g>
  </g>

  <!-- ============ GRUDGES ============ -->
  <g transform="translate(0, 858)">
    <text x="28" y="0" font-size="13" font-weight="600" letter-spacing="1.4" fill="#3A2E1F">GRUDGES</text>
    <line x1="28" y1="10" x2="362" y2="10" stroke="#8C6F2E" stroke-width="0.5" opacity="0.35"/>

    <g transform="translate(0, 36)">
      <text x="28" y="0" font-size="15" font-weight="400" font-style="italic" fill="#3A2E1F">
        <tspan x="28" dy="0">He smirked. I saw it. I will not</tspan>
        <tspan x="28" dy="20">forget that he smirked.</tspan>
      </text>
      <text x="362" y="0" text-anchor="end" font-size="12" letter-spacing="1.2" font-weight="500" fill="#7A6A52">DAY 2</text>
    </g>
  </g>

  <!-- ============ THE MARGIN ============ -->
  <g transform="translate(0, 1000)">
    <text x="28" y="0" font-size="13" font-weight="600" letter-spacing="1.4" fill="#3A2E1F">THE MARGIN</text>
    <line x1="28" y1="10" x2="362" y2="10" stroke="#8C6F2E" stroke-width="0.5" opacity="0.35"/>

    <text x="28" y="44" font-size="15" font-style="italic" font-weight="500" fill="#1A1308">The Wizard, today, is <tspan font-weight="500">petty</tspan>.</text>
    <text x="28" y="72" font-size="12" letter-spacing="1.2" font-weight="500" fill="#7A6A52">LAST AMENDED &#x2014; DAY 3, EVENING</text>
  </g>

  <!-- Bottom breathing space -->
  <g transform="translate(195, 1180)">
    <text text-anchor="middle" font-size="12" letter-spacing="1.4" fill="#7A6A52" opacity="0.5">&#x2014; END OF RECORD &#x2014;</text>
  </g>
</svg>
