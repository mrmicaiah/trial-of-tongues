<svg width="390" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'EB Garamond', Garamond, serif">
  <title>Chamber — idle, between turns, keyboard dismissed</title>
  <desc>The Chamber view with the keyboard dismissed. The full conversation is visible scrolling up. The wizard has finished his last response. The input bar sits at the bottom above the home indicator, waiting.</desc>

  <rect x="0" y="0" width="390" height="844" fill="#0a0a0a"/>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="#1a1a1a"/>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="#F4ECD8"/>

  <g opacity="0.06" fill="#1A1308">
    <circle cx="40" cy="80" r="0.8"/><circle cx="120" cy="60" r="0.6"/>
    <circle cx="200" cy="100" r="0.7"/><circle cx="280" cy="70" r="0.5"/>
    <circle cx="340" cy="120" r="0.8"/><circle cx="60" cy="200" r="0.6"/>
    <circle cx="160" cy="180" r="0.7"/><circle cx="240" cy="240" r="0.5"/>
    <circle cx="320" cy="220" r="0.6"/><circle cx="80" cy="320" r="0.7"/>
    <circle cx="180" cy="300" r="0.5"/><circle cx="280" cy="340" r="0.8"/>
    <circle cx="40" cy="420" r="0.6"/><circle cx="140" cy="400" r="0.5"/>
    <circle cx="220" cy="440" r="0.7"/><circle cx="340" cy="420" r="0.6"/>
    <circle cx="60" cy="540" r="0.6"/><circle cx="180" cy="560" r="0.5"/>
    <circle cx="300" cy="580" r="0.7"/><circle cx="80" cy="660" r="0.5"/>
    <circle cx="220" cy="680" r="0.6"/><circle cx="320" cy="700" r="0.7"/>
  </g>

  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#F4ECD8" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1A1308" stop-opacity="0.12"/>
  </radialGradient>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="url(#vignette)"/>

  <rect x="6" y="6" width="378" height="44" fill="#F4ECD8"/>
  <text x="36" y="33" font-size="15" font-weight="600" fill="#1A1308" font-family="-apple-system, system-ui, sans-serif">9:41</text>
  <g fill="#1A1308" opacity="0.8">
    <rect x="320" y="22" width="3" height="8" rx="0.5"/>
    <rect x="325" y="20" width="3" height="10" rx="0.5"/>
    <rect x="330" y="18" width="3" height="12" rx="0.5"/>
    <rect x="335" y="16" width="3" height="14" rx="0.5"/>
    <rect x="345" y="18" width="16" height="10" rx="2" fill="none" stroke="#1A1308" stroke-width="0.8"/>
    <rect x="347" y="20" width="11" height="6" rx="0.5"/>
  </g>

  <g transform="translate(36, 60)">
    <rect x="2" y="6" width="4" height="16" fill="#1A1308" opacity="0.7"/>
    <line x1="4" y1="6" x2="4" y2="2" stroke="#1A1308" stroke-width="0.6"/>
    <ellipse cx="4" cy="0" rx="2" ry="3.5" fill="#C9A65B"/>
    <ellipse cx="4" cy="-0.5" rx="1" ry="2" fill="#F4ECD8" opacity="0.6"/>
    <circle cx="4" cy="0" r="8" fill="#C9A65B" opacity="0.08"/>
  </g>
  <text x="350" y="74" text-anchor="end" font-size="10" letter-spacing="2.5" fill="#1A1308" opacity="0.5">dossier</text>
  <circle cx="358" cy="67" r="2" fill="#C9A65B"/>
  <line x1="30" y1="92" x2="360" y2="92" stroke="#1A1308" stroke-width="0.4" opacity="0.18"/>

  <text x="36" y="128" font-size="14" fill="#1A1308" font-style="italic" opacity="0.65">
    (the wizard does not look up.)
  </text>

  <text x="36" y="162" font-size="16" fill="#1A1308">
    <tspan x="36" dy="0">Three apprentices stand before me.</tspan>
    <tspan x="36" dy="20">Each makes one statement.</tspan>
  </text>

  <text x="52" y="222" font-size="15" fill="#1A1308" xml:space="preserve"><tspan font-style="italic">Alban</tspan> says: Bertin is lying.</text>
  <text x="52" y="244" font-size="15" fill="#1A1308" xml:space="preserve"><tspan font-style="italic">Bertin</tspan> says: Cyril is lying.</text>
  <text x="52" y="266" font-size="15" fill="#1A1308" xml:space="preserve"><tspan font-style="italic">Cyril</tspan> says: Alban and Bertin are both lying.</text>

  <text x="36" y="306" font-size="16" fill="#1A1308">
    <tspan x="36" dy="0">Exactly one tells the truth. Which one?</tspan>
  </text>

  <line x1="100" y1="346" x2="290" y2="346" stroke="#1A1308" stroke-width="0.3" opacity="0.2"/>

  <text x="354" y="378" text-anchor="end" font-size="13" fill="#1A1308" opacity="0.55" font-family="'JetBrains Mono', monospace">
    bertin.
  </text>

  <text x="36" y="420" font-size="14" fill="#1A1308" font-style="italic" opacity="0.65">
    (the wizard sets down his book.
  </text>
  <text x="36" y="438" font-size="14" fill="#1A1308" font-style="italic" opacity="0.65">
    slower than necessary.)
  </text>

  <text x="36" y="476" font-size="17" fill="#1A1308">
    <tspan x="36" dy="0">Hm. Yes. That is — that is the</tspan>
    <tspan x="36" dy="22">answer. Obviously. I wasn't</tspan>
    <tspan x="36" dy="22">testing whether you could solve</tspan>
    <tspan x="36" dy="22">it. I was testing how long you'd</tspan>
    <tspan x="36" dy="22">take, and you took an acceptable</tspan>
    <tspan x="36" dy="22">amount of time. Acceptable. Not</tspan>
    <tspan x="36" dy="22">impressive. Don't look at me</tspan>
    <tspan x="36" dy="22">like that.</tspan>
  </text>

  <text x="354" y="700" text-anchor="end" font-size="10" letter-spacing="2" fill="#C9A65B" opacity="0.8" font-style="italic">
    he wrote something down.
  </text>

  <line x1="6" y1="770" x2="384" y2="770" stroke="#1A1308" stroke-width="0.3" opacity="0.2"/>
  <text x="36" y="802" font-size="13" fill="#1A1308" opacity="0.35" font-style="italic">
    speak, apprentice
  </text>

  <rect x="135" y="830" width="120" height="5" rx="2.5" fill="#1A1308"/>
</svg>
