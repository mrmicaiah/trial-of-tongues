<svg width="390" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'EB Garamond', Garamond, serif">
  <title>Chamber — active puzzle, keyboard up, wizard mid-stream</title>
  <desc>The Chamber view on iPhone with the software keyboard visible. The wizard is mid-response, streaming text.</desc>

  <!-- iPhone bezel reference -->
  <rect x="0" y="0" width="390" height="844" fill="#0a0a0a"/>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="#1a1a1a"/>

  <!-- Parchment surface -->
  <rect x="6" y="6" width="378" height="832" rx="48" fill="#F4ECD8"/>

  <!-- Parchment grain -->
  <g opacity="0.06" fill="#1A1308">
    <circle cx="40" cy="80" r="0.8"/>
    <circle cx="120" cy="60" r="0.6"/>
    <circle cx="200" cy="100" r="0.7"/>
    <circle cx="280" cy="70" r="0.5"/>
    <circle cx="340" cy="120" r="0.8"/>
    <circle cx="60" cy="200" r="0.6"/>
    <circle cx="160" cy="180" r="0.7"/>
    <circle cx="240" cy="240" r="0.5"/>
    <circle cx="320" cy="220" r="0.6"/>
    <circle cx="80" cy="320" r="0.7"/>
    <circle cx="180" cy="300" r="0.5"/>
    <circle cx="280" cy="340" r="0.8"/>
    <circle cx="40" cy="420" r="0.6"/>
    <circle cx="140" cy="400" r="0.5"/>
    <circle cx="220" cy="440" r="0.7"/>
    <circle cx="340" cy="420" r="0.6"/>
  </g>

  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#F4ECD8" stop-opacity="0"/>
    <stop offset="100%" stop-color="#1A1308" stop-opacity="0.12"/>
  </radialGradient>
  <rect x="6" y="6" width="378" height="832" rx="48" fill="url(#vignette)"/>

  <!-- Status bar area -->
  <rect x="6" y="6" width="378" height="44" fill="#F4ECD8"/>
  <text x="36" y="33" font-size="15" font-weight="600" fill="#1A1308" font-family="-apple-system, system-ui, sans-serif">9:41</text>
  <g fill="#1A1308" opacity="0.8">
    <rect x="320" y="22" width="3" height="8" rx="0.5"/>
    <rect x="325" y="20" width="3" height="10" rx="0.5"/>
    <rect x="330" y="18" width="3" height="12" rx="0.5"/>
    <rect x="335" y="16" width="3" height="14" rx="0.5"/>
    <rect x="345" y="18" width="16" height="10" rx="2" fill="none" stroke="#1A1308" stroke-width="0.8"/>
    <rect x="347" y="20" width="11" height="6" rx="0.5"/>
  </g>

  <!-- Header -->
  <g transform="translate(36, 60)">
    <rect x="2" y="6" width="4" height="16" fill="#1A1308" opacity="0.7"/>
    <line x1="4" y1="6" x2="4" y2="2" stroke="#1A1308" stroke-width="0.6"/>
    <ellipse cx="4" cy="0" rx="2" ry="3.5" fill="#C9A65B"/>
    <ellipse cx="4" cy="-0.5" rx="1" ry="2" fill="#F4ECD8" opacity="0.6"/>
    <circle cx="4" cy="0" r="8" fill="#C9A65B" opacity="0.08"/>
  </g>

  <text x="350" y="74" text-anchor="end" font-size="10" letter-spacing="2.5" fill="#1A1308" opacity="0.5" font-family="'EB Garamond', Garamond, serif">dossier</text>
  <circle cx="358" cy="67" r="2" fill="#C9A65B"/>

  <line x1="30" y1="92" x2="360" y2="92" stroke="#1A1308" stroke-width="0.4" opacity="0.18"/>

  <!-- Puzzle text -->
  <text x="36" y="128" font-size="14" fill="#1A1308" font-style="italic" opacity="0.65">
    (the wizard does not look up from his book.)
  </text>

  <text x="36" y="168" font-size="17" fill="#1A1308">
    <tspan x="36" dy="0">Three apprentices stand before me.</tspan>
    <tspan x="36" dy="22">Each makes one statement.</tspan>
  </text>

  <text x="52" y="238" font-size="16" fill="#1A1308" xml:space="preserve"><tspan font-style="italic">Alban</tspan> says: Bertin is lying.</text>
  <text x="52" y="264" font-size="16" fill="#1A1308" xml:space="preserve"><tspan font-style="italic">Bertin</tspan> says: Cyril is lying.</text>
  <text x="52" y="290" font-size="16" fill="#1A1308" xml:space="preserve"><tspan font-style="italic">Cyril</tspan> says: Alban and Bertin are<tspan x="52" dy="20">both lying.</tspan></text>

  <text x="36" y="350" font-size="17" fill="#1A1308">
    <tspan x="36" dy="0">Exactly one tells the truth.</tspan>
    <tspan x="36" dy="22">Which one?</tspan>
  </text>

  <line x1="100" y1="410" x2="290" y2="410" stroke="#1A1308" stroke-width="0.3" opacity="0.2"/>

  <!-- Apprentice answer -->
  <text x="354" y="442" text-anchor="end" font-size="13" fill="#1A1308" opacity="0.55" font-family="'JetBrains Mono', monospace">
    bertin.
  </text>

  <!-- Wizard mid-stream -->
  <text x="36" y="486" font-size="14" fill="#1A1308" font-style="italic" opacity="0.65">
    (the wizard sets down his book.
  </text>
  <text x="36" y="504" font-size="14" fill="#1A1308" font-style="italic" opacity="0.65">
    slower than necessary.)
  </text>

  <text x="36" y="540" font-size="17" fill="#1A1308">
    <tspan x="36" dy="0">Hm. Yes. That is — that is the</tspan>
    <tspan x="36" dy="22">answer. Obviously. I wasn't</tspan>
    <tspan x="36" dy="22">testing whether you could</tspan>
    <tspan x="36" dy="22">solve it, I was testing how </tspan>
  </text>

  <!-- Streaming cursor -->
  <circle cx="232" cy="628" r="3" fill="#1A1308" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;3.5;3" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Input -->
  <line x1="6" y1="678" x2="384" y2="678" stroke="#1A1308" stroke-width="0.3" opacity="0.2"/>
  <text x="36" y="710" font-size="13" fill="#1A1308" opacity="0.35" font-style="italic" font-family="'EB Garamond', Garamond, serif">
    speak, apprentice
  </text>

  <!-- iOS keyboard -->
  <rect x="6" y="722" width="378" height="116" fill="#D1D3D9"/>
  <g fill="#FDFDFD" stroke="#A8AAB0" stroke-width="0.3">
    <rect x="14" y="730" width="34" height="42" rx="5"/>
    <rect x="50" y="730" width="34" height="42" rx="5"/>
    <rect x="86" y="730" width="34" height="42" rx="5"/>
    <rect x="122" y="730" width="34" height="42" rx="5"/>
    <rect x="158" y="730" width="34" height="42" rx="5"/>
    <rect x="194" y="730" width="34" height="42" rx="5"/>
    <rect x="230" y="730" width="34" height="42" rx="5"/>
    <rect x="266" y="730" width="34" height="42" rx="5"/>
    <rect x="302" y="730" width="34" height="42" rx="5"/>
    <rect x="338" y="730" width="34" height="42" rx="5"/>
    <rect x="32" y="776" width="34" height="42" rx="5"/>
    <rect x="68" y="776" width="34" height="42" rx="5"/>
    <rect x="104" y="776" width="34" height="42" rx="5"/>
    <rect x="140" y="776" width="34" height="42" rx="5"/>
    <rect x="176" y="776" width="34" height="42" rx="5"/>
    <rect x="212" y="776" width="34" height="42" rx="5"/>
    <rect x="248" y="776" width="34" height="42" rx="5"/>
    <rect x="284" y="776" width="34" height="42" rx="5"/>
    <rect x="320" y="776" width="34" height="42" rx="5"/>
  </g>
  <g font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#1A1308" text-anchor="middle">
    <text x="31" y="757">q</text><text x="67" y="757">w</text><text x="103" y="757">e</text>
    <text x="139" y="757">r</text><text x="175" y="757">t</text><text x="211" y="757">y</text>
    <text x="247" y="757">u</text><text x="283" y="757">i</text><text x="319" y="757">o</text>
    <text x="355" y="757">p</text>
    <text x="49" y="803">a</text><text x="85" y="803">s</text><text x="121" y="803">d</text>
    <text x="157" y="803">f</text><text x="193" y="803">g</text><text x="229" y="803">h</text>
    <text x="265" y="803">j</text><text x="301" y="803">k</text><text x="337" y="803">l</text>
  </g>

  <rect x="135" y="830" width="120" height="5" rx="2.5" fill="#1A1308"/>
</svg>
